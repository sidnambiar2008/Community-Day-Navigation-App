#Kotlin
kotlin.code.style=official
kotlin.daemon.jvmargs=-Xmx3072M

#Gradle
org.gradle.jvmargs=-Xmx4096M -Dfile.encoding=UTF-8
org.gradle.configuration-cache=false
org.gradle.caching=true

#Android
android.nonTransitiveRClass=true
android.useAndroidX=true
android.suppressUnsupportedCompileSdk=36

#Compose
kotlin.native.ignoreDisabledTargets=true
org.jetbrains.compose.experimental.jscanvas.enabled=true

#IOS
org.gradle.java.home=/Applications/Android\ Studio.app/Contents/jbr/Contents/Home

# Add this to support the newer Compose Web logic
org.jetbrains.compose.experimental.jswasm.enabled=true

# Helps with the Skiko/Node error we've been fighting
kotlin.js.generate.executable.default=true

# This is the "Magic" line for Skiko errors:
org.jetbrains.skiko.node.runtime=false
skiko.js.canvas.renderer=true
skiko.js.node.runtime=false
# This is often needed for Skia to initialize in the browser
org.jetbrains.skiko.library.path=
kotlin.native.cacheKind=none


